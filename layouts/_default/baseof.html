<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ with .Title }}{{ . }} — {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #222;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    header .site-name {
      font-size: 1.25rem;
      font-weight: 600;
      text-decoration: none;
      color: #222;
    }

    header nav a {
      margin-left: 1.5rem;
      text-decoration: none;
      color: #666;
      font-size: 0.9rem;
    }

    header nav a:hover { color: #222; }

    main {
      flex: 1;
      padding: 1rem 2rem 2rem;
    }

    footer {
      padding: 2rem;
      text-align: center;
      color: #999;
      font-size: 0.8rem;
    }

    footer a { color: #999; }

    /* Image grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .grid a {
      display: block;
      overflow: hidden;
      border-radius: 4px;
      background: #eee;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.2s ease;
    }

    .grid a:hover img {
      transform: scale(1.02);
    }

    /* Prose (about page) */
    .prose {
      max-width: 600px;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .prose p { margin-bottom: 1rem; }
    .prose a { color: #222; }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 1rem; padding-right: 1rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a class="site-name" href="/">{{ .Site.Title }}</a>
    <nav>
      <a href="/">Drawings</a>
      <a href="/about/">About</a>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    &copy; {{ now.Year }} {{ .Site.Title }}
  </footer>
</body>
</html>
